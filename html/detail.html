<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'none'; frame-src 'none'; object-src 'none'; base-uri 'self';" />
  <title>漏洞详情 — WebPenTest Lab</title>
  <link rel="stylesheet" href="../css/tokens.css" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/components.css" />
</head>
<body>
  <!-- 跳过导航链接（无障碍） -->
  <a href="#main-content" class="skip-nav">跳到主要内容</a>

  <!-- ========== Header（由 components.js 动态注入）========== -->
  <header id="site-header" class="site-header"></header>

  <main id="main-content">
    <!-- ========== 页面标题 ========== -->
    <section class="page-hero">
      <div class="hero-bg-orb hero-bg-orb--cyan" style="width:350px;height:350px;opacity:0.08;top:-5%;right:-5%"></div>
      <div class="hero-bg-orb hero-bg-orb--purple" style="width:250px;height:250px;opacity:0.06;bottom:0;left:-5%"></div>
      <div class="container">
        <nav aria-label="面包屑导航"><div class="breadcrumb">
          <a href="index.html">首页</a><span class="sep">/</span>
          <a href="list.html">学习笔记</a><span class="sep">/</span>
          <span>漏洞详情</span>
        </div></nav>
        <h1>漏洞<span class="highlight">深度分析</span></h1>
        <p>深入理解漏洞原理、攻击向量与完整防御策略</p>
      </div>
    </section>

    <section class="section" style="padding-top: 0;">
      <div class="container">

        <!-- 移动端侧边栏折叠按钮 -->
        <button class="detail-sidebar-toggle hide-desktop" id="detail-sidebar-btn">
          📋 内容导航
        </button>

        <!-- 侧边栏 + 主内容布局 (PC端) -->
        <div class="detail-layout">

          <!-- 侧边栏导航（由 vuln-data.js 动态渲染） -->
          <aside class="detail-sidebar" id="detail-sidebar">
            <div style="position: sticky; top: 100px;">
              <div class="card card-glass" style="padding: 1.5rem;">
                <h4 style="margin-bottom: 1rem; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--color-text-tertiary);">内容导航</h4>
                <nav id="vuln-sidebar-nav" style="display: flex; flex-direction: column; gap: 0.4rem;"></nav>
              </div>
            </div>
          </aside>

          <!-- 主内容区（由 vuln-data.js 动态渲染） -->
          <div>
            <div id="vuln-container"></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- ========== Footer（由 components.js 动态注入）========== -->
  <footer id="site-footer" class="site-footer"></footer>

  <script src="../js/components.js"></script>
  <script src="../js/common.js"></script>
  <script src="../js/vuln-data.js"></script>
  <script>
    (function () {
      'use strict';

      try {
        renderSidebarNav(VULNERABILITIES);
        renderVulnDetail('vuln-container');
      } catch (e) {
        const c = document.getElementById('vuln-container');
        if (c) c.innerHTML = '<div style="text-align:center;padding:4rem;color:var(--color-accent-red)"><p>渲染失败: ' + e.message + '</p></div>';
        console.error('[detail] 渲染失败:', e);
      }

      // 移动端侧边栏折叠
      const btn = document.getElementById('detail-sidebar-btn');
      const sidebar = document.getElementById('detail-sidebar');
      if (btn && sidebar) {
        btn.addEventListener('click', function () {
          sidebar.classList.toggle('open');
          btn.textContent = sidebar.classList.contains('open') ? '✕ 关闭导航' : '📋 内容导航';
        });
        sidebar.addEventListener('click', function (e) {
          if (e.target.tagName === 'A' && window.innerWidth < 1025) {
            sidebar.classList.remove('open');
            btn.textContent = '📋 内容导航';
          }
        });
      }

      // 侧边栏滚动高亮同步
      const articles = document.querySelectorAll('.detail-article');
      if (articles.length && 'IntersectionObserver' in window) {
        let activeLink = null;
        const observer = new IntersectionObserver(function (entries) {
          entries.forEach(function (entry) {
            if (entry.isIntersecting) {
              // 移除旧高亮
              if (activeLink) {
                activeLink.style.color = 'var(--color-text-tertiary)';
              }
              // 找到对应链接并高亮（O(1) 属性选择器）
              const link = document.querySelector('#vuln-sidebar-nav [href="#' + entry.target.id + '"]');
              if (link) {
                link.style.color = 'var(--color-accent)';
                activeLink = link;
              }
            }
          });
        }, { rootMargin: '-20% 0px -60% 0px', threshold: 0 });

        articles.forEach(function (el) { observer.observe(el); });
      }

      // URL 参数 id → 自动滚动
      const params = new URLSearchParams(window.location.search);
      const vulnId = params.get('id');
      if (vulnId) {
        const target = document.getElementById(vulnId);
        if (target) {
          setTimeout(function () {
            target.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }, 300);
        }
      }
    })();
  </script>
  <noscript>
    <div style="text-align:center;padding:4rem 2rem;color:var(--color-text-secondary);">
      <p>⚠️ 此页面需要启用 JavaScript 以加载漏洞详情内容。</p>
    </div>
  </noscript>
</body>
</html>
