<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://unpkg.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https://api.github.com https://raw.githubusercontent.com; frame-src 'none'; object-src 'none'; base-uri 'self';" />
  <title>学习笔记 — WebPenTest Lab</title>
  <link rel="stylesheet" href="../css/common.css" />
  <!-- highlight.js 代码高亮主题 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/atom-one-dark.min.css" crossorigin="anonymous" />
</head>
<body>
  <!-- 跳过导航链接（无障碍） -->
  <a href="#main-content" class="skip-nav">跳到主要内容</a>

  <!-- ========== Header（由 components.js 动态注入）========== -->
  <header id="site-header" class="site-header"></header>

  <main id="main-content">
    <!-- ========== 页面标题 ========== -->
    <section class="page-hero">
      <div class="container">
        <div class="breadcrumb">
          <a href="index.html">首页</a><span class="sep">/</span><span>学习笔记</span>
        </div>
        <h1>Web 渗透测试笔记</h1>
        <p>动态抓取自 GitHub 仓库 — 计算机技术学习 / Web渗透测试</p>
      </div>
    </section>

    <!-- ========== Vue3 学习笔记系统 ========== -->
    <div id="app">
      <template id="app-template">
        <div class="notes-layout">
          <!-- ===== 移动端侧边栏切换按钮 ===== -->
          <button class="sidebar-toggle hide-desktop"
                  @click="showSidebar = !showSidebar"
                  :aria-label="showSidebar ? '收起目录' : '展开目录'"
                  aria-expanded="true">
            <span v-if="showSidebar">✕ 收起目录</span>
            <span v-else>☰ 展开目录</span>
          </button>

          <!-- ===== 侧边栏：文件列表 ===== -->
          <aside :class="['notes-sidebar', showSidebar ? 'open' : '']">
            <div class="sidebar-inner">
              <div class="sidebar-header">
                <h3 class="sidebar-title">
                  <span style="font-size: 1.2rem;">📚</span> 课程目录
                </h3>
                <button class="btn btn-ghost btn-sm"
                        @click="fetchDirectory()"
                        :disabled="isDirLoading"
                        aria-label="刷新目录"
                        title="刷新目录">
                  🔄
                </button>
              </div>

              <!-- 目录加载态 -->
              <div v-if="isDirLoading" class="sidebar-loading">
                <div class="skeleton skeleton-line" v-for="n in 8" :key="n"
                     :style="'width:' + (60 + Math.random() * 40) + '%'"></div>
              </div>

              <!-- 目录错误态 -->
              <div v-else-if="dirError" class="sidebar-error">
                <p>{{ dirError }}</p>
                <button class="btn btn-outline btn-sm" @click="fetchDirectory()">重试</button>
              </div>

              <!-- 目录文件列表 -->
              <nav v-else class="sidebar-nav" aria-label="课程目录">
                <div v-for="file in filteredFiles" :key="file.name"
                     :class="['sidebar-item', selectedFile && selectedFile.name === file.name ? 'active' : '']"
                     role="button"
                     :tabindex="0"
                     @click="selectFile(file)"
                     @keydown.enter="selectFile(file)"
                     @keydown.space.prevent="selectFile(file)"
                     :aria-label="'打开笔记: ' + file.title"
                     :title="file.title">
                  <span class="sidebar-item-icon">{{ file.icon }}</span>
                  <div class="sidebar-item-content">
                    <span class="sidebar-item-num">{{ file.num < 10 ? '0' + file.num : file.num }}</span>
                    <span class="sidebar-item-title">{{ file.title }}</span>
                  </div>
                  <span class="sidebar-item-size">{{ formatSize(file.size) }}</span>
                </div>
                <div v-if="filteredFiles.length === 0 && searchQuery" class="sidebar-empty">
                  无匹配笔记
                </div>
              </nav>

              <!-- 侧边栏底部：资源目录链接 -->
              <div v-if="subdirs.length > 0" class="sidebar-footer">
                <div class="sidebar-subtitle">资源目录</div>
                <a v-for="dir in subdirs" :key="dir.name"
                   :href="dir.htmlUrl" target="_blank" rel="noopener"
                   class="sidebar-resource-link">
                  📁 {{ dir.name }}
                </a>
              </div>
            </div>
          </aside>

          <!-- ===== 移动端侧边栏遮罩 ===== -->
          <div v-if="showSidebar" class="sidebar-overlay hide-desktop" @click="showSidebar = false"></div>

          <!-- ===== 主内容区 ===== -->
          <section class="notes-content">
            <div class="content-area">
              <!-- 空状态：未选择文件 -->
              <div v-if="!selectedFile && !isLoading" class="content-empty">
                <div class="content-empty-icon">📖</div>
                <h2>Web 渗透测试学习笔记</h2>
                <p>从左侧目录选择一篇笔记开始阅读</p>
                <div class="content-empty-stats">
                  <div class="stat-card">
                    <div class="stat-value">{{ files.length }}</div>
                    <div class="stat-label">篇笔记</div>
                  </div>
                  <div class="stat-card">
                    <div class="stat-value">GitHub</div>
                    <div class="stat-label">数据源</div>
                  </div>
                  <div class="stat-card">
                    <div class="stat-value">GFM</div>
                    <div class="stat-label">渲染引擎</div>
                  </div>
                </div>
                <a :href="GITHUB_BASE" target="_blank" rel="noopener" class="btn btn-outline mt-3">
                  在 GitHub 查看全部 →
                </a>
              </div>

              <!-- 加载态 -->
              <div v-if="isLoading" class="content-loading">
                <div class="skeleton skeleton-title"></div>
                <div class="skeleton skeleton-line" style="width: 80%;"></div>
                <div class="skeleton skeleton-line" style="width: 60%;"></div>
                <div class="skeleton skeleton-line" style="width: 90%;"></div>
                <div class="skeleton skeleton-block"></div>
                <div class="skeleton skeleton-line" style="width: 70%;"></div>
                <div class="skeleton skeleton-line" style="width: 85%;"></div>
                <div class="skeleton skeleton-line" style="width: 45%;"></div>
              </div>

              <!-- 错误态 -->
              <div v-if="error && !isLoading" class="content-error">
                <div class="content-error-icon">⚠️</div>
                <h3>加载失败</h3>
                <p>{{ error }}</p>
                <div style="display: flex; gap: 0.75rem; justify-content: center; margin-top: 1.5rem;">
                  <button class="btn btn-primary" @click="retryLoad()">重新加载</button>
                  <button class="btn btn-outline" @click="backToList()">返回目录</button>
                </div>
              </div>

              <!-- Markdown 渲染内容 -->
              <div v-if="renderedHTML && selectedFile && !error" class="markdown-wrapper">
                <!-- 文件头部工具栏 -->
                <div class="content-toolbar">
                  <button class="btn btn-ghost btn-sm" @click="backToList()" aria-label="返回目录">
                    ← 目录
                  </button>
                  <div class="content-toolbar-nav">
                    <button class="btn btn-ghost btn-sm" @click="goToPrev()" :disabled="!hasPrev" aria-label="上一篇">
                      ← 上一篇
                    </button>
                    <span class="content-toolbar-pos">{{ currentIndex + 1 }} / {{ files.length }}</span>
                    <button class="btn btn-ghost btn-sm" @click="goToNext()" :disabled="!hasNext" aria-label="下一篇">
                      下一篇 →
                    </button>
                  </div>
                  <a :href="getGitHubUrl(selectedFile)" target="_blank" rel="noopener"
                     class="btn btn-outline btn-sm">
                    在 GitHub 查看 ↗
                  </a>
                </div>

                <!-- 文件标题 -->
                <div class="content-file-header">
                  <span class="content-file-icon">{{ selectedFile.icon }}</span>
                  <div>
                    <h2 class="content-file-title">{{ selectedFile.title }}</h2>
                    <div class="content-file-meta">
                      <span>{{ selectedFile.name }}</span>
                      <span>{{ formatSize(selectedFile.size) }}</span>
                      <span>编号 #{{ selectedFile.num }}</span>
                    </div>
                  </div>
                </div>

                <!-- Markdown 内容 -->
                <div class="markdown-body" v-html="renderedHTML"></div>

                <!-- 底部导航 -->
                <div class="content-footer-nav">
                  <button class="btn btn-outline" @click="goToPrev()" :disabled="!hasPrev">
                    ← {{ hasPrev ? files[currentIndex - 1].title : '已是第一篇' }}
                  </button>
                  <button class="btn btn-outline" @click="goToNext()" :disabled="!hasNext">
                    {{ hasNext ? files[currentIndex + 1].title : '已是最后一篇' }} →
                  </button>
                </div>

                <!-- 键盘快捷键提示 -->
                <div class="content-kbd-hints">
                  <kbd>Ctrl + ←</kbd> 上一篇 &nbsp;
                  <kbd>Ctrl + →</kbd> 下一篇 &nbsp;
                  <kbd>ESC</kbd> 返回目录
                </div>
              </div>
            </div>
          </section>
        </div>
      </template>
    </div>
  </main>

  <!-- ========== Footer（由 components.js 动态注入）========== -->
  <footer id="site-footer" class="site-footer"></footer>

  <!-- 依赖库 -->
  <script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js" crossorigin="anonymous"></script>
  <!-- 项目脚本 -->
  <script src="../js/components.js"></script>
  <script src="../js/common.js"></script>
  <script src="../vue/app.js"></script>
</body>
</html>
