<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://unpkg.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'none'; frame-src 'none'; object-src 'none'; base-uri 'self';" />
  <title>安全实验室 — WebPenTest Lab</title>
  <link rel="stylesheet" href="../css/common.css" />
  <style>
    /* 登录页专属样式 */
    .lab-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6rem 1rem 2rem;
      position: relative;
      overflow: hidden;
    }
    .lab-card {
      width: 100%;
      max-width: 460px;
      background: rgba(255, 255, 255, 0.015);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-2xl);
      padding: 2.5rem;
      position: relative;
      z-index: 10;
      box-shadow: 0 50px 100px rgba(0, 0, 0, 0.5);
    }
    .lab-tabs {
      display: flex;
      border-bottom: 1px solid var(--border-subtle);
      margin-bottom: 1.5rem;
    }
    .lab-tab {
      flex: 1;
      padding: 0.75rem;
      text-align: center;
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--color-text-tertiary);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all var(--duration-fast);
      background: none;
      font-family: inherit;
    }
    .lab-tab.active {
      color: var(--color-accent-glow);
      border-bottom-color: var(--color-accent);
    }
    .lab-panel {
      display: none;
    }
    .lab-panel.active { display: block; }

    .security-badge {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      background: rgba(16,185,129,0.08);
      border: 1px solid rgba(16,185,129,0.2);
      border-radius: var(--radius-md);
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
      color: var(--color-accent-emerald);
    }

    /* 数据泄露提示面板 */
    .leak-panel {
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      margin-top: 1.5rem;
      font-size: 0.85rem;
    }
    .leak-panel h4 {
      color: var(--color-accent-red);
      margin-bottom: 0.5rem;
    }
    .leak-panel code {
      display: block;
      margin-top: 0.5rem;
      word-break: break-all;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-nav">跳到主要内容</a>
  <header id="site-header" class="site-header"></header>
  <main id="main-content">
    <h1 class="sr-only">安全实验室 — 登录与注册</h1>
    <div class="lab-container">
      <!-- 背景光球 -->
      <div class="hero-bg-orb hero-bg-orb--cyan" style="width: 400px; height: 400px; opacity: 0.1;"></div>
      <div class="hero-bg-orb hero-bg-orb--purple" style="width: 350px; height: 350px; opacity: 0.1; bottom: 0; right: 0; top: auto;"></div>

      <div class="lab-card">
        <!-- 标签切换 -->
        <div class="lab-tabs">
          <button class="lab-tab active" data-tab="login">登录</button>
          <button class="lab-tab" data-tab="register">注册</button>
        </div>

        <!-- 安全提示 -->
        <div class="security-badge">
          🔒 本页面为前端演示，不会向服务器发送您的凭据
        </div>

        <!-- ===== 登录面板 ===== -->
        <div id="login-panel" class="lab-panel active">
          <form id="login-form" novalidate>
            <div class="form-group">
              <label class="form-label" for="login-email">邮箱地址</label>
              <input type="email" id="login-email" name="email"
                     class="form-input" placeholder="user@example.com"
                     data-validate='[{"rule":"required"},{"rule":"email"}]'
                     autocomplete="email" />
              <div class="form-error"></div>
            </div>
            <div class="form-group">
              <label class="form-label" for="login-password">密码</label>
              <input type="password" id="login-password" name="password"
                     class="form-input password-strength-input"
                     placeholder="请输入密码"
                     data-validate='[{"rule":"required"}]'
                     autocomplete="current-password" />
              <div class="form-error"></div>
            </div>
            <div class="flex-between" style="margin-bottom: 1.5rem;">
              <label class="form-check">
                <input type="checkbox" /> 记住我
              </label>
              <button type="button" class="link-btn">忘记密码？</button>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">登录实验室</button>
          </form>
        </div>

        <!-- ===== 注册面板 ===== -->
        <div id="register-panel" class="lab-panel">
          <form id="register-form" novalidate>
            <div class="form-group">
              <label class="form-label" for="reg-username">用户名</label>
              <input type="text" id="reg-username" name="username"
                     class="form-input" placeholder="3-20位字母或数字"
                     data-validate='[{"rule":"required"},{"rule":"minLength","param":3}]'
                     autocomplete="username" />
              <div class="form-error"></div>
            </div>
            <div class="form-group">
              <label class="form-label" for="reg-email">邮箱地址</label>
              <input type="email" id="reg-email" name="email"
                     class="form-input" placeholder="user@example.com"
                     data-validate='[{"rule":"required"},{"rule":"email"}]'
                     autocomplete="email" />
              <div class="form-error"></div>
            </div>
            <div class="form-group">
              <label class="form-label" for="reg-phone">手机号</label>
              <input type="tel" id="reg-phone" name="phone"
                     class="form-input" placeholder="11位手机号"
                     data-validate='[{"rule":"required"},{"rule":"phone"}]'
                     autocomplete="tel" />
              <div class="form-error"></div>
              <div class="form-hint">仅用于演示验证，不会发送短信</div>
            </div>
            <div class="form-group">
              <label class="form-label" for="reg-password">密码</label>
              <input type="password" id="reg-password" name="password"
                     class="form-input password-strength-input"
                     placeholder="至少8位，包含大小写字母和数字"
                     data-validate='[{"rule":"required"},{"rule":"password"}]'
                     autocomplete="new-password" />
              <div class="password-strength"></div>
              <div class="form-error"></div>
            </div>
            <div class="form-group">
              <label class="form-label" for="reg-confirm">确认密码</label>
              <input type="password" id="reg-confirm" name="confirm"
                     class="form-input" placeholder="请再次输入密码"
                     data-validate='[{"rule":"required"}]' />
              <div class="form-error"></div>
            </div>
            <div class="form-group">
              <label class="form-check">
                <input type="checkbox" name="agree" id="reg-agree" /> 我已阅读并同意 <button type="button" class="link-btn">服务条款</button> 和 <button type="button" class="link-btn">隐私政策</button>
              </label>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">创建账号</button>
          </form>
        </div>

        <!-- 安全提示面板 -->
        <div class="leak-panel">
          <h4>⚠️ 安全意识提示</h4>
          <p style="color: var(--color-text-tertiary); font-size: 0.82rem; margin-bottom: 0.5rem;">
            真实网站中，请务必检查以下几点：
          </p>
          <ul style="color: var(--color-text-tertiary); font-size: 0.82rem; padding-left: 1.2rem; line-height: 1.8;">
            <li>地址栏是否为 <strong style="color: var(--color-accent-emerald);">HTTPS</strong></li>
            <li>域名是否正确，谨防<strong style="color: var(--color-accent-red);">钓鱼网站</strong></li>
            <li>不要在公共 Wi-Fi 下登录敏感账户</li>
            <li>为不同网站使用<strong style="color: var(--color-accent-glow);">不同的密码</strong></li>
            <li>开启<strong style="color: var(--color-accent);">双因素认证 (2FA)</strong></li>
          </ul>
        </div>
      </div>
    </div>
  </main>

  <!-- ========== Footer（由 components.js 动态注入）========== -->
  <footer id="site-footer" class="site-footer"></footer>

  <script src="../js/components.js"></script>
  <script src="../js/common.js"></script>
  <script src="../js/auth.js"></script>
</body>
</html>
